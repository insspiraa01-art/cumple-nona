<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cumpleaños Nona</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
background:#6ec6cf;
font-family:Arial;
}

.container{
position:relative;
width:100%;
max-width:600px;
}

.container img{
width:100%;
display:block;
}

/* CONTADOR */

.contador{
position:absolute;
top:36%;
left:18%;
width:64%;
text-align:center;
font-size:38px;
font-weight:bold;
color:white;
background:rgba(0,170,180,0.85);
padding:14px;
border-radius:12px;
letter-spacing:3px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.tiempo{
display:flex;
justify-content:space-around;
}

.bloque{
text-align:center;
}

.numero{
font-size:36px;
}

.label{
font-size:12px;
}

/* MAPA */

.mapa{
position:absolute;
top:63%;
left:8%;
width:40%;
height:10%;
}

/* CLICK AQUI (CONFIRMAR ASISTENCIA) */

.whatsapp{
position:absolute;
top:89%;
left:25%;
width:50%;
height:6%;
}

a{
display:block;
}

/* reproductor oculto */

.music-player{
display:none;
}

</style>

</head>

<body>

<!-- MUSICA AUTOMATICA -->

<div class="music-player">
<iframe
width="0"
height="0"
src="https://www.youtube.com/embed/ZgdufzXvjqw?autoplay=1&loop=1&playlist=ZgdufzXvjqw"
frameborder="0"
allow="autoplay">
</iframe>
</div>

<div class="container">

<img src="invitacion.png">

<div class="contador">

<div class="tiempo">

<div class="bloque">
<div class="numero" id="dias"></div>
<div class="label">DÍAS</div>
</div>

<div class="bloque">
<div class="numero" id="horas"></div>
<div class="label">HORAS</div>
</div>

<div class="bloque">
<div class="numero" id="minutos"></div>
<div class="label">MIN</div>
</div>

<div class="bloque">
<div class="numero" id="segundos"></div>
<div class="label">SEG</div>
</div>

</div>

</div>

<a class="mapa"
href="https://maps.app.goo.gl/2mbsCxbHHR8FXzWd8"
target="_blank"></a>

<a class="whatsapp"
href="https://wa.me/3115929384?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20de%20la%20nona"
target="_blank"></a>

</div>

<script>

var fechaEvento = new Date("Apr 18, 2026 00:00:00").getTime();

setInterval(function(){

var ahora = new Date().getTime();
var diferencia = fechaEvento - ahora;

var dias = Math.floor(diferencia / (1000*60*60*24));
var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
var segundos = Math.floor((diferencia % (1000*60)) / 1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("minutos").innerHTML = minutos;
document.getElementById("segundos").innerHTML = segundos;

},1000);

</script>

</body>
</html>

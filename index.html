<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cumpleaños Nona</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
background:#6ec6cf;
font-family:Arial;
}

/* CONTENEDOR RESPONSIVE */

.container{
position:relative;
width:100%;
max-width:600px;
margin:auto;
}

/* IMAGEN INVITACION */

.container img{
width:100%;
height:auto;
display:block;
}

/* CONTADOR */

.contador{
position:absolute;
top:40%;
left:18%;
width:64%;
}

/* BOTON MUSICA */

.musica{
position:absolute;
top:33%;
left:18%;

height:6%;
}

/* BOTON MAPA */

.mapa{
position:absolute;
top:48%;
left:18%;
width:64%;
height:6%;
}

/* BOTON CONFIRMAR */

.whatsapp{
position:absolute;
bottom:4%;
left:18%;
width:64%;
height:7%;
}

a{
display:block;
}

</style>

</head>

<body>

<div class="container">

<img src="invitacion.png">

<!-- CONTADOR -->

<div class="contador">

<script>
(function(d, s, id) {
var js, pjs = d.getElementsByTagName(s)[0];
if (!d.getElementById(id)) {
js = d.createElement(s);
js.id = id;
js.src = "https://www.tickcounter.com/static/js/loader.js";
pjs.parentNode.insertBefore(js, pjs);
}
}(document, "script", "tickcounter-sdk"));
</script>

<a data-type="countdown"
data-id="9813060"
class="tickcounter"

</a>

<a class="mapa"

<a class="whatsapp"
href="https://wa.me/3115929384?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20de%20la%20nona"
target="_blank"></a>

</div>

</html>

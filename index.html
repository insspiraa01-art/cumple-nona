<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Nona</title>

<style>

body{
  margin:0;
  display:flex;
  justify-content:center;
  background:#63c7c9;
  font-family:Arial;
}

.container{
  position:relative;
  width:100%;
  max-width:600px;
}

.container img{
  width:100%;
  display:block;
}

/* CONTADOR */

.contador{
  position:absolute;
  top:40%;
  left:18%;
  width:64%;
  text-align:center;
  font-size:34px;
  font-weight:bold;
  color:white;
  background:rgba(0,170,180,0.9);
  padding:14px;
  border-radius:12px;
  letter-spacing:2px;
  z-index:2;
}

.tiempo{
  display:flex;
  justify-content:space-around;
}

.bloque{
  text-align:center;
}

.numero{
  font-size:30px;
}

.label{
  font-size:12px;
}

/* BOTONES */

.boton{
  position:absolute;
  padding:10px 14px;
  border:none;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  color:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  z-index:5;
}

/* BOTON MUSICA */

.boton-musica{
  top:24%;
  right:4%;
  background:#ff4d6d;
}

/* BOTON MAPA */

.boton-mapa{
  top:66%;
  right:10%;
  background:#ff8c42;
}

/* BOTON WHATSAPP */

.boton-whatsapp{
  top:90%;
  left:30%;
  background:#25D366;
}

/* AJUSTE CELULAR */

@media (max-width:600px){

.contador{
  top:36%;
  left:15%;
  width:70%;
  font-size:26px;
}

.boton-musica{
  top:22%;
  right:6%;
}

.boton-mapa{
  top:67%;
  right:12%;
}

.boton-whatsapp{
  top:90%;
  left:25%;
}

}

</style>
</head>

<body>

<audio id="audioFiesta" loop>
  <source src="rock.mp3" type="audio/mpeg">
</audio>

<div class="container">

<img src="invitacion.png">

<!-- BOTON MUSICA -->
<button class="boton boton-musica" onclick="activarMusica()">
🎵 Música
</button>

<!-- BOTON MAPA -->
<button class="boton boton-mapa"
onclick="window.open('https://maps.app.goo.gl/2mbsCxbHHR8FXzWd8','_blank')">
📍 Ver mapa
</button>

<!-- BOTON WHATSAPP -->
<button class="boton boton-whatsapp"
onclick="window.open('https://wa.me/3115929384?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20de%20la%20nona','_blank')">
💬 Confirmar
</button>

<div class="contador">

<div class="tiempo">

<div class="bloque">
<div class="numero" id="dias"></div>
<div class="label">DÍAS</div>
</div>

<div class="bloque">
<div class="numero" id="horas"></div>
<div class="label">HORAS</div>
</div>

<div class="bloque">
<div class="numero" id="minutos"></div>
<div class="label">MIN</div>
</div>

<div class="bloque">
<div class="numero" id="segundos"></div>
<div class="label">SEG</div>
</div>

</div>
</div>

</div>

<script>

/* MUSICA */

function activarMusica(){
  const audio = document.getElementById("audioFiesta");
  audio.play();
}

/* CONTADOR */

var fechaEvento = new Date("Apr 18, 2026 00:00:00").getTime();

setInterval(function(){

var ahora = new Date().getTime();
var diferencia = fechaEvento - ahora;

var dias = Math.floor(diferencia / (1000*60*60*24));
var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
var segundos = Math.floor((diferencia % (1000*60)) / 1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("minutos").innerHTML = minutos;
document.getElementById("segundos").innerHTML = segundos;

},1000);

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Nona</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  background:#63c7c9;
  font-family:Arial, sans-serif;
}

.container{
  position:relative;
  width:100%;
  max-width:600px;
}

.container img{
  width:100%;
  display:block;
}

/* CONTADOR */

.contador{
  position:absolute;
  top:40%;
  left:18%;
  width:64%;
  text-align:center;
  font-size:34px;
  font-weight:bold;
  color:white;
  background:rgba(0,170,180,0.9);
  padding:14px;
  border-radius:12px;
  letter-spacing:2px;
  z-index:2;
}

.tiempo{
  display:flex;
  justify-content:space-around;
}

.numero{ font-size:30px; }
.label{ font-size:12px; }

/* CONTROLES MUSICA (debajo del título Música) */

.music-controls{
  position:absolute;
  top:22%;
  left:58%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:5;
}

.music-controls button{
  background:none;
  border:none;
  color:#ffffff;
  font-size:14px;
  cursor:pointer;
  text-shadow:0 2px 6px rgba(0,0,0,0.5);
}

/* MAPA (zona invisible sobre el cuadro de Google Maps) */

.mapa{
  position:absolute;
  top:67%;
  right:8%;
  width:34%;
  height:12%;
  z-index:4;
}

/* CONFIRMAR (zona invisible sobre "Click aquí") */

.confirmar{
  position:absolute;
  top:90%;
  left:35%;
  width:30%;
  height:5%;
  z-index:4;
}

/* enlaces invisibles */
a{
  display:block;
  text-decoration:none;
  background:transparent;
}

/* AJUSTE MOVIL */

@media (max-width:600px){

  .contador{
    top:36%;
    left:15%;
    width:70%;
    font-size:26px;
  }

  .music-controls{
    top:20%;
    left:60%;
  }

  .mapa{
    top:68%;
    right:6%;
    width:36%;
    height:12%;
  }

  .confirmar{
    top:91%;
    left:32%;
    width:36%;
  }

}
</style>
</head>

<body>

<audio id="audioFiesta" loop>
<source src="rock.mp3" type="audio/mpeg">
</audio>

<div class="container">

<img src="invitacion.png">

<!-- CONTROLES MUSICA -->
<div class="music-controls">
<button onclick="playMusic()">▶ Reproducir</button>
<button onclick="pauseMusic()">⏸ Pausar</button>
</div>

<!-- CONTADOR -->
<div class="contador">
<div class="tiempo">

<div>
<div class="numero" id="dias"></div>
<div class="label">DÍAS</div>
</div>

<div>
<div class="numero" id="horas"></div>
<div class="label">HORAS</div>
</div>

<div>
<div class="numero" id="minutos"></div>
<div class="label">MIN</div>
</div>

<div>
<div class="numero" id="segundos"></div>
<div class="label">SEG</div>
</div>

</div>
</div>

<!-- MAPA -->
<a class="mapa"
href="https://maps.app.goo.gl/2mbsCxbHHR8FXzWd8"
target="_blank"></a>

<!-- CONFIRMAR -->
<a class="confirmar"
href="https://wa.me/3115929384?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20de%20la%20nona"
target="_blank"></a>

</div>

<script>

/* MUSICA */

const audio = document.getElementById("audioFiesta");

function playMusic(){
  audio.play();
}

function pauseMusic(){
  audio.pause();
}

/* CONTADOR */

var fechaEvento = new Date("Apr 18, 2026 00:00:00").getTime();

setInterval(function(){

var ahora = new Date().getTime();
var diferencia = fechaEvento - ahora;

var dias = Math.floor(diferencia / (1000*60*60*24));
var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
var segundos = Math.floor((diferencia % (1000*60)) / 1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("minutos").innerHTML = minutos;
document.getElementById("segundos").innerHTML = segundos;

},1000);

</script>

</body>
</html>
```

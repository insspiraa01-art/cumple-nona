<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cumpleaños Nona</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
background:#6ec6cf;
font-family:Arial;
}

.container{
position:relative;
width:100%;
max-width:600px;
}

.container img{
width:100%;
display:block;
}

/* CONTADOR */

.contador{
position:absolute;
top:32%;
left:20%;
width:60%;
text-align:center;
font-size:32px;
font-weight:bold;
color:black;
background:white;
padding:10px;
border-radius:5px;
}

/* MUSICA (ROCKOLA) */

.musica{
position:absolute;
top:58%;
left:60%;
width:25%;
height:10%;
}

/* MAPA */

.mapa{
position:absolute;
top:63%;
left:8%;
width:40%;
height:10%;
}

/* WHATSAPP */

.whatsapp{
position:absolute;
bottom:4%;
left:20%;
width:60%;
height:8%;
}

a{
display:block;
}

</style>

</head>

<body>

<div class="container">

<img src="invitacion.png">

<div class="contador" id="countdown"></div>

<a class="musica"
href="https://www.youtube.com/watch?v=yBdKMv9_vPE&list=RDyBdKMv9_vPE&start_radio=1"
target="_blank"></a>

<a class="mapa"
href="https://maps.app.goo.gl/2mbsCxbHHR8FXzWd8"
target="_blank"></a>

<a class="whatsapp"
href="https://wa.me/3115929384?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20de%20la%20nona"
target="_blank"></a>

</div>

<script>

var countDownDate = new Date("Apr 18, 2026 00:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + " : " + hours + " : " + minutes + " : " + seconds;

if (distance < 0) {
clearInterval(x);
document.getElementById("countdown").innerHTML = "¡Llegó el día!";
}

}, 1000);

</script>

</body>
</html>

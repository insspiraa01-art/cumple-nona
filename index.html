<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cumpleaños Nona</title>

<style>

/* CONTENEDOR RESPONSIVE */

.container{

/* BOTON MUSICA */

top:33%;
left:18%;

height:6%;
}

/* BOTON MAPA */

.mapa{
position:absolute;
top:55%;
left:18%;
width:64%;
height:6%;
}

/* BOTON CONFIRMAR */

.whatsapp{

bottom:4%;
left:18%;
width:64%;
height:7%;
}

a{
display:block;
}

</style>

</head>

<body>

<div class="container">

<img src="invitacion.png">
